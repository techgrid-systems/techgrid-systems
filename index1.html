<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Access</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background-color: #f4f4f9; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; }
        #message { color: red; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-container" id="loginBox">
    <h2>Enter Credentials</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkCredentials()">Login</button>
    <p id="message"></p>
</div>

<div id="protectedContent" style="display:none;">
    <h1>Welcome to the Secret Page!</h1>
    <p>You have successfully logged in.</p>
</div>

<script>
    function checkCredentials() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // Replace these with your desired credentials
        if (user === "admin" && pass === "secret123") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("protectedContent").style.display = "block";
        } else {
            document.getElementById("message").innerText = "Invalid credentials!";
        }
    }
</script>

</body>
</html>
